<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ASCII 3D Shape Viewer (WebGL2)</title>
<style>
    html, body { margin: 0; padding: 0; height: 100%; background: #1a1b26; overflow: hidden; }
    canvas { display: block; }
    #fps { position: fixed; top: 4px; right: 8px; color: #666; font: 12px monospace; z-index: 10; }
</style>
</head>
<body>
<canvas id="display"></canvas>
<div id="fps"></div>
<script>
// ═══════════════════════════════════════════════════════════════════════
// WebGL2 Instanced Text Renderer
// Renders entire terminal grid in a SINGLE draw call.
// Font atlas texture + per-cell instance data (position, glyph, color).
// ═══════════════════════════════════════════════════════════════════════

var canvas = document.getElementById('display');
var gl = canvas.getContext('webgl2', { antialias: false, alpha: false });
var fpsEl = document.getElementById('fps');

if (!gl) { document.body.textContent = 'WebGL2 required'; throw new Error('No WebGL2'); }

// ── Font atlas ──────────────────────────────────────────────────────

var FONT_SIZE = 14;
var FONT = FONT_SIZE + 'px monospace';
var GLYPH_START = 32;
var GLYPH_COUNT = 95;
var CELL_W = 0, CELL_H = 0;
var ATLAS_COLS = 16;  // glyphs per row in atlas
var ATLAS_ROWS = Math.ceil(GLYPH_COUNT / 16);
var atlasTexture = null;

function buildFontAtlas() {
    // Measure cell size
    var tmp = document.createElement('canvas');
    var tmpCtx = tmp.getContext('2d');
    tmpCtx.font = FONT;
    CELL_W = Math.ceil(tmpCtx.measureText('M').width);
    CELL_H = FONT_SIZE + 2;

    // Render atlas
    var aw = CELL_W * ATLAS_COLS;
    var ah = CELL_H * ATLAS_ROWS;
    tmp.width = aw;
    tmp.height = ah;
    tmpCtx = tmp.getContext('2d');
    tmpCtx.font = FONT;
    tmpCtx.textBaseline = 'top';
    tmpCtx.fillStyle = '#ffffff';
    for (var i = 0; i < GLYPH_COUNT; i++) {
        var col = i % ATLAS_COLS;
        var row = Math.floor(i / ATLAS_COLS);
        tmpCtx.fillText(String.fromCharCode(GLYPH_START + i), col * CELL_W, row * CELL_H + 1);
    }

    // Upload to WebGL texture
    atlasTexture = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, atlasTexture);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, tmp);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
}

// ── Shaders ─────────────────────────────────────────────────────────

var VERT_SRC = `#version 300 es
layout(location=0) in vec2 a_quad;
layout(location=1) in vec4 a_cell;  // x=col, y=row, z=glyphIdx, w=packed color (unused, use a_color)
layout(location=2) in vec3 a_color; // r,g,b [0..1]
layout(location=3) in float a_bgFlag; // 1.0 = HUD row (has background)

uniform vec2 u_gridSize;    // (cols, rows+1 for HUD)
uniform vec2 u_canvasSize;  // pixel size
uniform vec2 u_atlasGrid;   // (ATLAS_COLS, ATLAS_ROWS)

out vec2 v_texCoord;
out vec3 v_color;
out float v_bgFlag;
out float v_isSpace;

void main() {
    float col = a_cell.x;
    float row = a_cell.y;
    float glyphIdx = a_cell.z;

    // Cell position in pixels
    float cellW = u_canvasSize.x / u_gridSize.x;
    float cellH = u_canvasSize.y / u_gridSize.y;

    vec2 pixPos = vec2(col * cellW, row * cellH) + a_quad * vec2(cellW, cellH);

    // Convert to clip space
    vec2 clipPos = (pixPos / u_canvasSize) * 2.0 - 1.0;
    clipPos.y = -clipPos.y;  // flip Y
    gl_Position = vec4(clipPos, 0.0, 1.0);

    // Atlas UV
    float atlasCol = mod(glyphIdx, u_atlasGrid.x);
    float atlasRow = floor(glyphIdx / u_atlasGrid.x);
    v_texCoord = (vec2(atlasCol, atlasRow) + a_quad) / u_atlasGrid;

    v_color = a_color;
    v_bgFlag = a_bgFlag;
    v_isSpace = glyphIdx <= 0.5 ? 1.0 : 0.0; // space = glyph 0
}`;

var FRAG_SRC = `#version 300 es
precision mediump float;
in vec2 v_texCoord;
in vec3 v_color;
in float v_bgFlag;
in float v_isSpace;

uniform sampler2D u_atlas;
out vec4 fragColor;

void main() {
    if (v_bgFlag > 0.5) {
        // HUD: light bg, dark text
        vec3 bgColor = vec3(0.753, 0.792, 0.961); // #c0caf5
        if (v_isSpace > 0.5) {
            fragColor = vec4(bgColor, 1.0);
            return;
        }
        float alpha = texture(u_atlas, v_texCoord).a;
        vec3 textColor = vec3(0.102, 0.106, 0.149); // #1a1b26
        fragColor = vec4(mix(bgColor, textColor, alpha), 1.0);
    } else {
        if (v_isSpace > 0.5) discard;
        float alpha = texture(u_atlas, v_texCoord).a;
        if (alpha < 0.05) discard;
        fragColor = vec4(v_color * alpha, alpha);
    }
}`;

// ── GL setup ────────────────────────────────────────────────────────

var program, quadVBO, instanceVBO, vao;
var maxInstances = 0;
var instanceData = null; // Float32Array

function initGL() {
    function compile(type, src) {
        var s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
            console.error(gl.getShaderInfoLog(s));
            return null;
        }
        return s;
    }
    var vs = compile(gl.VERTEX_SHADER, VERT_SRC);
    var fs = compile(gl.FRAGMENT_SHADER, FRAG_SRC);
    program = gl.createProgram();
    gl.attachShader(program, vs);
    gl.attachShader(program, fs);
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error(gl.getProgramInfoLog(program));
    }

    // Unit quad [0,1]x[0,1] as triangle strip
    quadVBO = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, quadVBO);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([0,0, 1,0, 0,1, 1,1]), gl.STATIC_DRAW);

    // Instance buffer (will be resized as needed)
    instanceVBO = gl.createBuffer();

    // VAO
    vao = gl.createVertexArray();
    gl.bindVertexArray(vao);

    // Quad vertices (location 0)
    gl.bindBuffer(gl.ARRAY_BUFFER, quadVBO);
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

    // Instance data (locations 1-3): cell(4f) + color(3f) + bgFlag(1f) = 8 floats
    gl.bindBuffer(gl.ARRAY_BUFFER, instanceVBO);

    // a_cell (location 1): 4 floats at offset 0
    gl.enableVertexAttribArray(1);
    gl.vertexAttribPointer(1, 4, gl.FLOAT, false, 32, 0);
    gl.vertexAttribDivisor(1, 1);

    // a_color (location 2): 3 floats at offset 16
    gl.enableVertexAttribArray(2);
    gl.vertexAttribPointer(2, 3, gl.FLOAT, false, 32, 16);
    gl.vertexAttribDivisor(2, 1);

    // a_bgFlag (location 3): 1 float at offset 28
    gl.enableVertexAttribArray(3);
    gl.vertexAttribPointer(3, 1, gl.FLOAT, false, 32, 28);
    gl.vertexAttribDivisor(3, 1);

    gl.bindVertexArray(null);

    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
}

// ── Grid sizing ─────────────────────────────────────────────────────

var gridCols = 0, gridRows = 0;

function updateSize() {
    var w = window.innerWidth;
    var h = window.innerHeight;
    gridCols = Math.floor(w / CELL_W);
    gridRows = Math.floor(h / CELL_H);
    if (gridCols < 10) gridCols = 10;
    if (gridRows < 5) gridRows = 5;
    canvas.width = gridCols * CELL_W;
    canvas.height = gridRows * CELL_H;
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (Module._set_term_size) {
        Module._set_term_size(gridCols, gridRows);
    }
}

// ── Frame rendering ─────────────────────────────────────────────────

function renderFrame() {
    if (!Module._get_back_buf_ptr || !program) return;
    if (gridCols === 0 || gridRows === 0) return;

    var ptr = Module._get_back_buf_ptr();
    var cellSize = Module._get_back_buf_cell_size();
    var rowStride = Module._get_back_buf_row_stride();
    var cols = gridCols;
    var rows = gridRows - 2;
    if (rows < 1) rows = 1;
    var totalRows = rows + 1; // +1 for HUD

    // Build instance data: 8 floats per cell
    var needed = cols * totalRows;
    if (needed > maxInstances) {
        maxInstances = needed + 256;
        instanceData = new Float32Array(maxInstances * 8);
    }

    var heap = Module.HEAPU8;
    var count = 0;

    for (var row = 0; row < totalRows; row++) {
        var rowBase = ptr + row * rowStride;
        var isHud = (row === rows) ? 1.0 : 0.0;
        for (var col = 0; col < cols; col++) {
            var cellOff = rowBase + col * cellSize;
            var ch = heap[cellOff];
            var r = heap[cellOff + 1];
            var g = heap[cellOff + 2];
            var b = heap[cellOff + 3];

            // Skip invisible cells (but always include HUD for background)
            if (!isHud && (ch <= 32 || (r === 0 && g === 0 && b === 0))) continue;

            var off = count * 8;
            instanceData[off + 0] = col;           // cell x
            instanceData[off + 1] = row;           // cell y
            instanceData[off + 2] = ch - GLYPH_START; // glyph index
            instanceData[off + 3] = 0;             // unused
            instanceData[off + 4] = r / 255.0;    // color r
            instanceData[off + 5] = g / 255.0;    // color g
            instanceData[off + 6] = b / 255.0;    // color b
            instanceData[off + 7] = isHud;         // bg flag
            count++;
        }
    }

    // Upload and draw
    gl.clearColor(0.102, 0.106, 0.149, 1.0); // #1a1b26
    gl.clear(gl.COLOR_BUFFER_BIT);

    if (count === 0) return;

    gl.bindBuffer(gl.ARRAY_BUFFER, instanceVBO);
    gl.bufferData(gl.ARRAY_BUFFER, instanceData.subarray(0, count * 8), gl.DYNAMIC_DRAW);

    gl.useProgram(program);
    gl.uniform2f(gl.getUniformLocation(program, 'u_gridSize'), cols, totalRows);
    gl.uniform2f(gl.getUniformLocation(program, 'u_canvasSize'), canvas.width, canvas.height);
    gl.uniform2f(gl.getUniformLocation(program, 'u_atlasGrid'), ATLAS_COLS, ATLAS_ROWS);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, atlasTexture);
    gl.uniform1i(gl.getUniformLocation(program, 'u_atlas'), 0);

    gl.bindVertexArray(vao);
    gl.drawArraysInstanced(gl.TRIANGLE_STRIP, 0, 4, count);

    gl.bindVertexArray(null);

    // FPS
    var fps = Module._get_fps ? Module._get_fps() : 0;
    var rms = Module._get_render_ms ? Module._get_render_ms() : 0;
    var oms = Module._get_output_ms ? Module._get_output_ms() : 0;
    if (fps > 0) {
        fpsEl.textContent = Math.round(fps) + ' fps  r:' + rms.toFixed(1) + ' o:' + oms.toFixed(1) + ' ms';
    }
}

// ── Keyboard ────────────────────────────────────────────────────────

document.addEventListener('keydown', function(e) {
    if (!Module._push_key) return;
    var map = { ArrowUp: '\x1b[A', ArrowDown: '\x1b[B', ArrowRight: '\x1b[C', ArrowLeft: '\x1b[D' };
    if (map[e.key]) {
        var seq = map[e.key];
        for (var i = 0; i < seq.length; i++) Module._push_key(seq.charCodeAt(i));
        e.preventDefault();
        return;
    }
    if (e.key === 'Escape') {
        Module._push_key(27);
        e.preventDefault();
        return;
    }
    if (e.key === 'Enter') { Module._push_key(13); e.preventDefault(); return; }
    if (e.key.length === 1) { Module._push_key(e.key.charCodeAt(0)); e.preventDefault(); }
});

// ── BH GPU/Worker support (shared with viewer-web) ──────────────────

function readBHParams(ptr) {
    var f = ptr >> 2;
    return {
        camX: Module.HEAPF32[f], camY: Module.HEAPF32[f+1], camZ: Module.HEAPF32[f+2],
        fwdX: Module.HEAPF32[f+3], fwdY: Module.HEAPF32[f+4], fwdZ: Module.HEAPF32[f+5],
        rightX: Module.HEAPF32[f+6], rightY: Module.HEAPF32[f+7], rightZ: Module.HEAPF32[f+8],
        upX: Module.HEAPF32[f+9], upY: Module.HEAPF32[f+10], upZ: Module.HEAPF32[f+11],
        ax: Module.HEAPF32[f+12], ay: Module.HEAPF32[f+13], diskTime: Module.HEAPF32[f+14],
        cols: Module.HEAP32[f+15], rows: Module.HEAP32[f+16], hc: Module.HEAP32[f+17]
    };
}

// BH GPU shader renderer (offscreen WebGL1 context for ray tracing)
var bhGl2 = null, bhProg2 = null, bhFBO2 = null, bhTex2 = null, bhVBO2 = null;
var bhPW2 = 0, bhPH2 = 0;

var BH_VERT2 = 'attribute vec2 a_pos;void main(){gl_Position=vec4(a_pos,0.0,1.0);}';
var BH_FRAG2 = [
'precision highp float;',
'uniform vec2 u_resolution;uniform vec3 u_cam_pos,u_cam_fwd,u_cam_right,u_cam_up;',
'uniform vec2 u_fov,u_cols_rows;uniform float u_disk_time;',
'#define BH_RS 1.0\n#define R_ISCO 3.0\n#define R_OUTER 12.0',
'vec3 bb(float t){t=clamp(t,0.0,1.0);if(t<0.33){float s=t/0.33;return vec3(0.5+0.5*s,0.1*s*s,0.0);}',
'else if(t<0.66){float s=(t-0.33)/0.33;return vec3(1.0,0.1+0.7*s,0.05+0.3*s*s);}',
'else{float s=(t-0.66)/0.34;return vec3(1.0-0.15*s,0.8+0.2*s,0.35+0.65*s);}}',
'void main(){float sx=gl_FragCoord.x-0.5;float sy=(u_resolution.y-gl_FragCoord.y)-0.5;',
'float u=(2.0*(sx/2.0)-u_cols_rows.x)/u_cols_rows.x;',
'float v=(u_cols_rows.y-2.0*(sy/3.0))/u_cols_rows.y;',
'u+=(mod(sx,2.0)<1.0?-0.25:0.25)/u_cols_rows.x;',
'v+=((2.0-mod(sy,3.0))-1.0)*0.333/u_cols_rows.y;',
'vec3 dir=u_cam_fwd+u*u_fov.x*u_cam_right+v*u_fov.y*u_cam_up;',
'vec3 pos=u_cam_pos;vec3 vel=normalize(dir);float dt=0.25;float r=length(pos);',
'vec3 h=cross(pos,vel);float f=-1.5*dot(h,h)/(r*r*r*r*r);vec3 acc=f*pos/r;',
'vec3 tc=vec3(0.0);float tl=0.0;',
'for(int i=0;i<150;i++){float py=pos.y;pos+=vel*dt+0.5*acc*dt*dt;r=length(pos);',
'if(r<BH_RS)break;h=cross(pos,vel);f=-1.5*dot(h,h)/(r*r*r*r*r);',
'vec3 a2=f*pos/r;vel+=0.5*(acc+a2)*dt;acc=a2;',
'if(py*pos.y<=0.0&&(py!=0.0||pos.y!=0.0)){',
'float fr=abs(py)/(abs(py)+abs(pos.y)+1e-12);',
'float cx=pos.x-vel.x*dt*(1.0-fr);float cz=pos.z-vel.z*dt*(1.0-fr);',
'float cr=sqrt(cx*cx+cz*cz);if(cr>=R_ISCO&&cr<=R_OUTER){',
'float br=sqrt(R_ISCO/cr);float phi=atan(cz,cx)+u_disk_time;',
'float dop=1.0+0.35*sin(phi);float bn=0.85+0.15*sin(cr*3.0-u_disk_time*2.0);',
'float sp=0.9+0.1*sin(phi*2.0-cr*0.8+u_disk_time*1.5);',
'float lm=clamp(br*dop*bn*sp,0.0,1.0);float tp=clamp(br+0.15*sin(phi),0.0,1.0);',
'tc+=bb(tp)*lm;tl+=lm;if(tl>1.5)break;}}if(r>50.0)break;}',
'if(tl>1.0){tc/=tl;tl=1.0;}gl_FragColor=vec4(tc,tl);}'
].join('\n');

function initBhGl2() {
    if (bhGl2) return true;
    var c = document.createElement('canvas');
    bhGl2 = c.getContext('webgl', {antialias:false,depth:false,stencil:false});
    if (!bhGl2) return false;
    var g = bhGl2;
    function comp(t,s){var sh=g.createShader(t);g.shaderSource(sh,s);g.compileShader(sh);
        if(!g.getShaderParameter(sh,g.COMPILE_STATUS)){console.error(g.getShaderInfoLog(sh));return null;}return sh;}
    var vs=comp(g.VERTEX_SHADER,BH_VERT2), fs=comp(g.FRAGMENT_SHADER,BH_FRAG2);
    if(!vs||!fs)return false;
    bhProg2=g.createProgram();g.attachShader(bhProg2,vs);g.attachShader(bhProg2,fs);
    g.bindAttribLocation(bhProg2,0,'a_pos');g.linkProgram(bhProg2);
    if(!g.getProgramParameter(bhProg2,g.LINK_STATUS)){console.error(g.getProgramInfoLog(bhProg2));return false;}
    bhVBO2=g.createBuffer();g.bindBuffer(g.ARRAY_BUFFER,bhVBO2);
    g.bufferData(g.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),g.STATIC_DRAW);
    bhTex2=g.createTexture();bhFBO2=g.createFramebuffer();return true;
}

window.bhGpuRender = function(bhPtr, pixPtr) {
    if (!initBhGl2()) return 0;
    var g=bhGl2, p=readBHParams(bhPtr), w=p.hc, h=p.rows*3;
    if(w!==bhPW2||h!==bhPH2){g.canvas.width=w;g.canvas.height=h;
        g.bindTexture(g.TEXTURE_2D,bhTex2);g.texImage2D(g.TEXTURE_2D,0,g.RGBA,w,h,0,g.RGBA,g.UNSIGNED_BYTE,null);
        g.texParameteri(g.TEXTURE_2D,g.TEXTURE_MIN_FILTER,g.NEAREST);g.texParameteri(g.TEXTURE_2D,g.TEXTURE_MAG_FILTER,g.NEAREST);
        g.bindFramebuffer(g.FRAMEBUFFER,bhFBO2);g.framebufferTexture2D(g.FRAMEBUFFER,g.COLOR_ATTACHMENT0,g.TEXTURE_2D,bhTex2,0);bhPW2=w;bhPH2=h;}
    g.bindFramebuffer(g.FRAMEBUFFER,bhFBO2);g.viewport(0,0,w,h);g.useProgram(bhProg2);
    var u=function(n){return g.getUniformLocation(bhProg2,n);};
    g.uniform2f(u('u_resolution'),w,h);g.uniform3f(u('u_cam_pos'),p.camX,p.camY,p.camZ);
    g.uniform3f(u('u_cam_fwd'),p.fwdX,p.fwdY,p.fwdZ);g.uniform3f(u('u_cam_right'),p.rightX,p.rightY,p.rightZ);
    g.uniform3f(u('u_cam_up'),p.upX,p.upY,p.upZ);g.uniform2f(u('u_fov'),p.ax,p.ay);
    g.uniform2f(u('u_cols_rows'),p.cols,p.rows);g.uniform1f(u('u_disk_time'),p.diskTime);
    g.bindBuffer(g.ARRAY_BUFFER,bhVBO2);g.enableVertexAttribArray(0);g.vertexAttribPointer(0,2,g.FLOAT,false,0,0);
    g.drawArrays(g.TRIANGLE_STRIP,0,4);
    var px=new Uint8Array(w*h*4);g.readPixels(0,0,w,h,g.RGBA,g.UNSIGNED_BYTE,px);
    var rb=w*4,tmp2=new Uint8Array(rb);
    for(var r=0;r<Math.floor(h/2);r++){var t=r*rb,b2=(h-1-r)*rb;tmp2.set(px.subarray(t,t+rb));px.copyWithin(t,b2,b2+rb);px.set(tmp2,b2);}
    Module.HEAPU8.set(px,pixPtr);return 1;
};

// Worker pool
var bhWorkers=[],bhWorkerCount=0,bhWorkerPending=0,bhCurrentRequestId=0;
window.bhWorkerFrameReady=0;
function initBHWorkers(){if(bhWorkers.length>0)return;bhWorkerCount=Math.min(navigator.hardwareConcurrency||4,8);
    for(var i=0;i<bhWorkerCount;i++){var w=new Worker('bh_worker.js');w.onmessage=onBHWorkerResult;bhWorkers.push(w);}}
function onBHWorkerResult(e){var d=e.data;if(d.requestId!==bhCurrentRequestId)return;
    var lum=new Float32Array(d.lum),colR=new Float32Array(d.colR),colG=new Float32Array(d.colG),colB=new Float32Array(d.colB);
    var stride=Module._get_lum_buf_stride(),lP=Module._get_lum_buf_ptr(),rP=Module._get_col_r_ptr(),gP=Module._get_col_g_ptr(),bP=Module._get_col_b_ptr();
    var hc=d.hc,idx=0;
    for(var sy=d.rowStart;sy<d.rowEnd;sy++){var off=sy*stride;for(var sx=0;sx<hc;sx++){
        Module.HEAPF32[(lP>>2)+off+sx]=lum[idx];Module.HEAPF32[(rP>>2)+off+sx]=colR[idx];
        Module.HEAPF32[(gP>>2)+off+sx]=colG[idx];Module.HEAPF32[(bP>>2)+off+sx]=colB[idx];idx++;}}
    bhWorkerPending--;if(bhWorkerPending<=0){window.bhWorkerFrameReady=1;bhWorkerPending=0;}}
window.dispatchBHWork=function(bhPtr,requestId,hr){initBHWorkers();var p=readBHParams(bhPtr);
    bhCurrentRequestId=requestId;window.bhWorkerFrameReady=0;
    var rPW=Math.ceil(hr/bhWorkerCount);bhWorkerPending=0;
    for(var i=0;i<bhWorkerCount;i++){var rs=i*rPW,re=Math.min(rs+rPW,hr);if(rs>=hr)break;bhWorkerPending++;
        bhWorkers[i].postMessage({cols:p.cols,rows:p.rows,hc:p.hc,rowStart:rs,rowEnd:re,
            camX:p.camX,camY:p.camY,camZ:p.camZ,fwdX:p.fwdX,fwdY:p.fwdY,fwdZ:p.fwdZ,
            rightX:p.rightX,rightY:p.rightY,rightZ:p.rightZ,upX:p.upX,upY:p.upY,upZ:p.upZ,
            ax:p.ax,ay:p.ay,diskTime:p.diskTime,requestId:requestId});}};

// ── Module + writeToTerminal ────────────────────────────────────────

window.writeToTerminal = function(data) { renderFrame(); };

var Module = {
    print: function(text) { console.log(text); },
    printErr: function(text) { console.error(text); },
    onRuntimeInitialized: function() {
        buildFontAtlas();
        initGL();
        updateSize();
        Module._set_term_size(gridCols, gridRows);
        window.addEventListener('resize', function() { updateSize(); });
    }
};
</script>
<script src="viewer_web.js"></script>
</body>
</html>
